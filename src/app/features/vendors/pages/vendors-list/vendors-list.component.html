<div class="vendors-page">
  <div class="page-header">
    <h1>All Vendors</h1>
    <div class="search-box">
      <input 
        type="text" 
        placeholder="Search vendors..."
        [(ngModel)]="searchQuery"
        (input)="filterVendors()"
        class="search-input">
      <span class="search-icon">🔍</span>
    </div>
  </div>

  <div class="vendors-grid">
    <div class="vendor-card" *ngFor="let vendor of filteredVendors">
      <div class="card-header">
        <span class="vendor-logo">📦</span>
        <h3 class="vendor-name">{{ vendor.vendorName }}</h3>
      </div>

      <div class="card-body">
        <div class="stat-row">
          <span class="stat-label">Total Sales:</span>
          <span class="stat-value">{{ vendor.value | number }}</span>
        </div>

        <div class="stat-row">
          <span class="stat-label">Material Group:</span>
          <span class="stat-value">{{ vendor.materialGroup }}</span>
        </div>
      </div>

      <div class="card-footer">
        <div class="progress-bar">
          <div 
            class="progress-fill" 
            [style.width.%]="getPercentage(vendor.value)">
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="no-results" *ngIf="filteredVendors.length === 0">
    <p>No vendors found matching "{{ searchQuery }}"</p>
  </div>
</div>
