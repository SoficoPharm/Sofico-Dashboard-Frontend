<div class="login-container">
  <div class="login-card">
    <!-- Logo -->
    <div class="login-header">
      <img src="\logoSoficoPharam.png" alt="Sofico Pharm" class="login-logo">
      <h1>SOFICO</h1>
      <p>Sign in to your account</p>
    </div>

    <!-- Login Form -->
    <form class="login-form" (ngSubmit)="onLogin()">
      <!-- Email -->
      <div class="form-group">
        <label for="email">Email</label>
        <input 
          type="email" 
          id="email" 
          class="form-input"
          placeholder="Enter your email"
          [(ngModel)]="email"
          name="email"
          required
        >
      </div>

      <!-- Password -->
      <div class="form-group">
        <label for="password">Password</label>
        <input 
          type="password" 
          id="password" 
          class="form-input"
          placeholder="••••••••"
          [(ngModel)]="password"
          name="password"
          required
        >
      </div>

      <!-- Remember Me -->
      <div class="form-options">
        <label class="checkbox-label">
          <input 
            type="checkbox" 
            [(ngModel)]="rememberMe"
            name="rememberMe"
          >
          <span>Remember me</span>
        </label>
      </div>

      <!-- Error Message -->
      <div class="error-message" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <!-- Submit Button -->
      <button type="submit" class="login-btn">
        Sign In
      </button>
    </form>

    <!-- Footer -->
    <div class="login-footer">
      <p>© 2025 Sofico Pharm. All rights reserved.</p>
    </div>
  </div>
</div>
