<div class="login-container">
<div class="brand-top">
  <img src="/logoSoficoPharam.png" class="brand-logo" alt="Soficopharm" />
  <h1>SOFICOPHARM</h1>
  <p class="bold">Sofico Dashboard</p>
</div>

  <div class="login-card">
    <div class="login-header">
      <h2>Sign in</h2>
      <p>Enter your username and password .</p>
    </div>

    <form class="login-form" (ngSubmit)="onLogin()">
      <div class="form-group">
        <label for="username">Username</label>
        <input
          type="text"
          id="username"
          class="form-input"
          placeholder="Enter your username"
          [(ngModel)]="username"
          name="username"
          [disabled]="isLoading"
          required
        />
      </div>

      <div class="form-group password-row">
        <div class="label-row">
          <label for="password">Password</label>
          <span>Forgot password?</span>
        </div>

        <input
          type="password"
          id="password"
          class="form-input"
          placeholder="••••••••"
          [(ngModel)]="password"
          name="password"
          [disabled]="isLoading"
          required
        />
      </div>

      <div class="form-options">
        <label class="checkbox-label">
          <input
            type="checkbox"
            [(ngModel)]="rememberMe"
            name="rememberMe"
            [disabled]="isLoading"
          />
          <span>Remember me for 30 days</span>
        </label>
      </div>

      <div class="error-message" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <button type="submit" class="login-btn" [disabled]="isLoading">
        <span *ngIf="!isLoading">Sign in</span>
        <span *ngIf="isLoading">Signing in...</span>
        <span class="arrow">→</span>
      </button>
    </form>

    <div class="login-divider">
      <span></span>
      <p>OR CONTINUE WITH</p>
      <span></span>
    </div>

    <button type="button" class="sso-btn">
      <span>⚿</span>
      Sign in with SSO
    </button>

    <div class="login-footer">
      <p>© 2026 Soficopharm</p>
    </div>
  </div>
</div>
