<div class="sales-chart-container">
  <!-- Header -->
  <div class="chart-header">
    <div class="chart-title">
      <span class="icon">📊</span>
      <h3>Total Sales / Target</h3>
    </div>
    
    <div class="chart-controls">
      <!-- Period Filter (Auto-reload) -->
      <app-period-filter 
        [selectedPeriod]="filters.period"
        (periodChange)="onPeriodChange($event)">
      </app-period-filter>

      <!-- Year Filter (Auto-reload) -->
      <app-year-filter 
        [selectedYear]="filters.year"
        (yearChange)="onYearChange($event)">
      </app-year-filter>

      <!-- Date Filter (Manual-reload) -->
      <app-date-filter 
        [selectedDate]="filters.selectedDate"
        (dateChange)="onDateChange($event)">
      </app-date-filter>

      <!-- Branch Filter (Manual-reload) -->
      <app-branch-filter 
        [selectedBranchId]="filters.branchId"
        (branchChange)="onBranchChange($event)">
      </app-branch-filter>

      <!-- Search Button -->
      <app-search-filter 
        (searchClick)="onSearchClick()">
      </app-search-filter>
    </div>
  </div>


  <!-- Last Sync -->
  <div class="last-sync">
    Last Sync: {{ lastSync | date:'yyyy-MM-dd HH:mm:ss' }}
  </div>

  <!-- Chart -->
  <div class="chart-wrapper">
    <app-line-chart 
      *ngIf="chartData"
      [data]="chartData" 
      [options]="chartOptions">
    </app-line-chart>
    
    <!-- Empty State -->
    <div *ngIf="!chartData" class="empty-state">
      <p>📊 Loading data...</p>
    </div>
  </div>

  <!-- Legend -->
  <div class="chart-legend" *ngIf="chartData">
    <div class="legend-item">
      <span class="legend-color" style="background: #3b82f6;"></span>
      <span>Sales {{ filters.year }}: 0</span>
    </div>
    <div class="legend-item">
      <span class="legend-color" style="background: #ef4444;"></span>
      <span>Target {{ filters.year }}: 0</span>
    </div>
  </div>
</div>
