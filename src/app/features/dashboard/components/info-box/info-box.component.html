<div class="info-box">
  <div class="info-header">
    <span class="version">Version: {{ version }}</span>
    <button class="refresh-btn" (click)="updateDateTime()">🔄</button>
  </div>
  
  <div class="datetime-section">
    <div class="current-time">
      <span class="day">{{ currentDay }},</span>
      <!-- <span class="time">{{ currentTime }}</span> -->
    </div>
    
  </div>

  <!-- Last Sync Info -->
  <div class="sync-info">
    <div class="sync-row">
      <span class="sync-label">Last Sync:</span>
      <span class="sync-status" [class.connected]="signalRConnected">
        {{ signalRConnected ? '🟢' : '🔴' }}
      </span>
    </div>
    <div class="sync-value" [class.syncing]="lastSync === 'Waiting for sync...'">
      {{ lastSync }}
    </div>
  </div>
